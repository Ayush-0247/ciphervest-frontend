<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (Important for ranking) -->
    <title>CipherVest Capital | Crypto Analytics & Market Intelligence Platform</title>

    <!-- SEO Description -->
    <meta name="description" content="CipherVest Capital is a next-generation crypto intelligence platform providing real-time market insights, advanced analytics, portfolio tracking, and blockchain data solutions." />

    <!-- Keywords (less important but still useful) -->
    <meta name="keywords" content="crypto analytics, cryptocurrency platform, blockchain insights, crypto portfolio tracker, bitcoin analysis, ethereum data, crypto market trends" />

    <!-- Author -->
    <meta name="author" content="CipherVest Capital" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="CipherVest Capital" />
    <meta property="og:description" content="Next-gen crypto intelligence platform with analytics, insights, and portfolio tracking." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ciphervest.com" />
    <meta property="og:image" content="https://ciphervest.com/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CipherVest Capital" />
    <meta name="twitter:description" content="Advanced crypto analytics and market intelligence platform." />
    <meta name="twitter:image" content="https://ciphervest.com/preview.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ciphervest.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <circle cx='50' cy='50' r='50' fill='%230f172a'/>
      <text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle'
      font-family='Arial, sans-serif' font-size='60' fill='%23ffffff'>C</text>
    </svg>" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Preconnect (performance boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Structured Data (JSON-LD for Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CipherVest Capital",
      "url": "https://ciphervest.com",
      "logo": "https://ciphervest.com/logo.png",
      "sameAs": [
        "https://twitter.com/ciphervest",
        "https://linkedin.com/company/ciphervest"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
